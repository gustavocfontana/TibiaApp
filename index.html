<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TibiaApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <h1>Tibia<span>App</span></h1>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-label">Trackers</div>
            <button class="nav-item active" data-page="soul-cores">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="4.93" y1="4.93" x2="9.17" y2="9.17"/><line x1="14.83" y1="14.83" x2="19.07" y2="19.07"/><line x1="14.83" y1="9.17" x2="19.07" y2="4.93"/><line x1="4.93" y1="19.07" x2="9.17" y2="14.83"/></svg>
                Soul Cores
            </button>

            <div class="nav-label">Rankings</div>
            <button class="nav-item" data-page="highscores">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
                Highscores
            </button>

            <div class="nav-label">Info</div>
            <button class="nav-item" data-page="spells">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                Spells
            </button>
            <button class="nav-item" data-page="worlds">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                Worlds
            </button>
        </nav>
        <div class="sidebar-footer">
            Dados via TibiaData API
        </div>
    </aside>

    <div class="mobile-header">
        <button class="menu-toggle" id="menu-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 style="font-size:1rem;font-weight:700;">Tibia<span style="color:var(--accent)">App</span></h1>
    </div>

    <div class="main">
        <div class="page-header" id="page-header"></div>
        <div class="content-area" id="content">
            <div class="loading"><div class="spinner"></div><p>Carregando...</p></div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <input type="file" id="import-file" accept=".json" style="display:none">

    <script src="js/pages/soul-cores.js"></script>
    <script src="js/pages/highscores.js"></script>
    <script src="js/pages/spells.js"></script>
    <script src="js/pages/worlds.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

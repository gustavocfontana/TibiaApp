<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibia Soul Cores Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 20px 24px;
            border-bottom: 2px solid #e94560;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.6rem;
            color: #e94560;
            margin-bottom: 12px;
        }

        header h1 span {
            color: #e0e0e0;
            font-weight: 300;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0f0f23;
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: #e94560;
        }

        .filter-buttons {
            display: flex;
            gap: 6px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0f0f23;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: #e94560;
        }

        .filter-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
        }

        .stats-bar {
            display: flex;
            gap: 16px;
            padding: 12px 24px;
            background: #16213e;
            border-bottom: 1px solid #222;
            align-items: center;
            flex-wrap: wrap;
        }

        .stat {
            font-size: 0.9rem;
            color: #aaa;
        }

        .stat strong {
            color: #e94560;
            font-size: 1.1rem;
        }

        .progress-container {
            flex: 1;
            min-width: 200px;
            height: 8px;
            background: #0f0f23;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        .export-btn {
            padding: 6px 14px;
            border: 1px solid #e94560;
            border-radius: 6px;
            background: transparent;
            color: #e94560;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .export-btn:hover {
            background: #e94560;
            color: #fff;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
            font-size: 1.1rem;
            color: #888;
        }

        .loading::after {
            content: '';
            width: 24px;
            height: 24px;
            margin-left: 12px;
            border: 3px solid #333;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
            padding: 16px 24px;
        }

        .creature-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: #16213e;
            border: 1px solid #222;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .creature-card:hover {
            border-color: #e94560;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(233, 69, 96, 0.15);
        }

        .creature-card.owned {
            background: linear-gradient(135deg, #1a3a2a, #16213e);
            border-color: #2ecc71;
        }

        .creature-card.owned .check-indicator {
            background: #2ecc71;
            border-color: #2ecc71;
        }

        .creature-card.owned .check-indicator::after {
            content: '\2713';
            color: #fff;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .check-indicator {
            width: 20px;
            height: 20px;
            min-width: 20px;
            border: 2px solid #444;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .creature-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .creature-name {
            font-size: 0.8rem;
            line-height: 1.2;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1rem;
        }

        .error-msg {
            text-align: center;
            padding: 40px;
            color: #e94560;
        }

        .error-msg button {
            margin-top: 12px;
            padding: 8px 20px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                padding: 12px;
                gap: 6px;
            }

            header {
                padding: 16px;
            }

            .stats-bar {
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Soul Cores <span>Tracker</span></h1>
        <div class="controls">
            <input type="text" class="search-box" id="search" placeholder="Buscar criatura..." autocomplete="off">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="owned">Obtidas</button>
                <button class="filter-btn" data-filter="missing">Faltando</button>
            </div>
        </div>
    </header>

    <div class="stats-bar">
        <span class="stat">Obtidas: <strong id="owned-count">0</strong></span>
        <span class="stat">Total: <strong id="total-count">0</strong></span>
        <span class="stat">Progresso: <strong id="progress-pct">0%</strong></span>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
        </div>
        <button class="export-btn" id="export-btn" title="Exportar/Importar dados">Exportar</button>
        <button class="export-btn" id="import-btn" title="Importar dados">Importar</button>
        <button class="export-btn" id="reset-btn" title="Resetar tudo">Resetar</button>
    </div>

    <div id="content">
        <div class="loading">Carregando criaturas</div>
    </div>

    <input type="file" id="import-file" accept=".json" style="display: none">

    <script>
        const STORAGE_KEY = 'tibia-soul-cores-owned';
        const API_URL = 'https://api.tibiadata.com/v4/creatures';

        let allCreatures = [];
        let ownedSet = new Set();
        let currentFilter = 'all';

        function loadOwned() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) {
                    ownedSet = new Set(JSON.parse(data));
                }
            } catch {
                ownedSet = new Set();
            }
        }

        function saveOwned() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify([...ownedSet]));
        }

        function updateStats() {
            const total = allCreatures.length;
            const owned = ownedSet.size;
            const pct = total > 0 ? ((owned / total) * 100).toFixed(1) : 0;

            document.getElementById('owned-count').textContent = owned;
            document.getElementById('total-count').textContent = total;
            document.getElementById('progress-pct').textContent = `${pct}%`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
        }

        function toggleOwned(race) {
            if (ownedSet.has(race)) {
                ownedSet.delete(race);
            } else {
                ownedSet.add(race);
            }
            saveOwned();
            updateStats();

            const card = document.querySelector(`[data-race="${race}"]`);
            if (card) {
                card.classList.toggle('owned', ownedSet.has(race));

                if (currentFilter !== 'all') {
                    const shouldShow =
                        (currentFilter === 'owned' && ownedSet.has(race)) ||
                        (currentFilter === 'missing' && !ownedSet.has(race));
                    card.style.display = shouldShow ? '' : 'none';
                }
            }
        }

        function renderCreatures(filter = '', filterType = 'all') {
            const content = document.getElementById('content');
            const searchTerm = filter.toLowerCase();

            let filtered = allCreatures.filter(c => {
                const matchesSearch = c.name.toLowerCase().includes(searchTerm);
                const matchesFilter =
                    filterType === 'all' ||
                    (filterType === 'owned' && ownedSet.has(c.race)) ||
                    (filterType === 'missing' && !ownedSet.has(c.race));
                return matchesSearch && matchesFilter;
            });

            if (filtered.length === 0) {
                content.innerHTML = '<div class="grid"><div class="no-results">Nenhuma criatura encontrada.</div></div>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'grid';

            const fragment = document.createDocumentFragment();
            for (const creature of filtered) {
                const card = document.createElement('div');
                card.className = `creature-card${ownedSet.has(creature.race) ? ' owned' : ''}`;
                card.dataset.race = creature.race;
                card.addEventListener('click', () => toggleOwned(creature.race));

                card.innerHTML = `
                    <div class="check-indicator"></div>
                    <img class="creature-img"
                         src="${creature.image_url}"
                         alt="${creature.name}"
                         loading="lazy"
                         onerror="this.style.display='none'">
                    <span class="creature-name" title="${creature.name}">${creature.name}</span>
                `;
                fragment.appendChild(card);
            }

            grid.appendChild(fragment);
            content.innerHTML = '';
            content.appendChild(grid);
        }

        function applyFilters() {
            const search = document.getElementById('search').value;
            renderCreatures(search, currentFilter);
        }

        async function loadCreatures() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                allCreatures = data.creatures.creature_list
                    .map(c => ({
                        name: c.name,
                        race: c.race,
                        image_url: c.image_url
                    }))
                    .sort((a, b) => a.name.localeCompare(b.name));

                renderCreatures();
                updateStats();
            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <div class="error-msg">
                        <p>Erro ao carregar criaturas: ${err.message}</p>
                        <button onclick="loadCreatures()">Tentar novamente</button>
                    </div>
                `;
            }
        }

        // Search
        let searchTimeout;
        document.getElementById('search').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(applyFilters, 200);
        });

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                applyFilters();
            });
        });

        // Export
        document.getElementById('export-btn').addEventListener('click', () => {
            const data = {
                version: 1,
                exported_at: new Date().toISOString(),
                owned: [...ownedSet]
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `soul-cores-backup-${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        // Import
        document.getElementById('import-btn').addEventListener('click', () => {
            document.getElementById('import-file').click();
        });

        document.getElementById('import-file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.owned && Array.isArray(data.owned)) {
                        ownedSet = new Set(data.owned);
                        saveOwned();
                        applyFilters();
                        updateStats();
                        alert(`Importado! ${ownedSet.size} soul cores marcadas como obtidas.`);
                    } else {
                        alert('Formato de arquivo invalido.');
                    }
                } catch {
                    alert('Erro ao ler o arquivo.');
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        // Reset
        document.getElementById('reset-btn').addEventListener('click', () => {
            if (confirm('Tem certeza que deseja resetar todas as soul cores?')) {
                ownedSet.clear();
                saveOwned();
                applyFilters();
                updateStats();
            }
        });

        // Init
        loadOwned();
        loadCreatures();
    </script>
</body>
</html>

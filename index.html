<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TibiaApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0c0e14;
            --bg-secondary: #12151e;
            --bg-card: #181c28;
            --bg-card-hover: #1e2333;
            --bg-sidebar: #10121a;
            --bg-input: #0e1018;
            --border: #1e2233;
            --border-hover: #2a3050;
            --text-primary: #e8eaf0;
            --text-secondary: #8890a4;
            --text-muted: #555d74;
            --accent: #6c5ce7;
            --accent-hover: #7f71ed;
            --accent-glow: rgba(108, 92, 231, 0.15);
            --success: #00b894;
            --success-soft: rgba(0, 184, 148, 0.1);
            --success-border: rgba(0, 184, 148, 0.3);
            --danger: #e17055;
            --sidebar-width: 220px;
            --header-height: 56px;
            --radius: 10px;
            --radius-sm: 6px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 200;
            transition: transform 0.3s ease;
        }

        .sidebar-brand {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-brand svg {
            width: 28px;
            height: 28px;
            fill: var(--accent);
        }

        .sidebar-brand h1 {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .sidebar-brand span {
            color: var(--accent);
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            padding: 16px 12px 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.85rem;
            font-weight: 500;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background: var(--accent-glow);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent-glow);
            color: var(--accent);
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .nav-item.active svg {
            fill: var(--accent);
        }

        .nav-item .coming-soon {
            margin-left: auto;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--border);
            color: var(--text-muted);
            font-weight: 600;
        }

        .sidebar-footer {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* ── Main Layout ── */
        .main {
            margin-left: var(--sidebar-width);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Page Header ── */
        .page-header {
            padding: 20px 28px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .page-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .page-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title h2 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .page-title .badge {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--accent-glow);
            color: var(--accent);
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-icon:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--bg-card-hover);
        }

        .btn-icon.danger:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-icon svg {
            width: 16px;
            height: 16px;
        }

        .btn-icon .tooltip {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.7rem;
            white-space: nowrap;
            color: var(--text-secondary);
        }

        .btn-icon {
            position: relative;
        }

        .btn-icon:hover .tooltip {
            display: block;
        }

        /* ── Stats Cards ── */
        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-icon.purple {
            background: var(--accent-glow);
            color: var(--accent);
        }

        .stat-icon.green {
            background: var(--success-soft);
            color: var(--success);
        }

        .stat-icon.orange {
            background: rgba(225, 112, 85, 0.1);
            color: var(--danger);
        }

        .stat-icon svg {
            width: 18px;
            height: 18px;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* ── Progress ── */
        .progress-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .progress-track {
            flex: 1;
            height: 6px;
            background: var(--bg-input);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #a29bfe);
            border-radius: 3px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent);
            min-width: 48px;
            text-align: right;
        }

        /* ── Controls ── */
        .controls-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 16px;
        }

        .search-wrapper {
            flex: 1;
            position: relative;
        }

        .search-wrapper svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-muted);
        }

        .search-input {
            width: 100%;
            padding: 9px 14px 9px 36px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .filter-group {
            display: flex;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .filter-btn {
            padding: 9px 16px;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            border-right: 1px solid var(--border);
        }

        .filter-btn:last-child {
            border-right: none;
        }

        .filter-btn:hover {
            color: var(--text-primary);
            background: var(--bg-card-hover);
        }

        .filter-btn.active {
            background: var(--accent);
            color: #fff;
        }

        /* ── Content Grid ── */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 28px 28px;
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .content-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .content-area::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
        }

        .creature-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .creature-card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            transform: translateY(-1px);
        }

        .creature-card.owned {
            background: var(--success-soft);
            border-color: var(--success-border);
        }

        .creature-card.owned:hover {
            background: rgba(0, 184, 148, 0.15);
        }

        .check-box {
            width: 18px;
            height: 18px;
            min-width: 18px;
            border: 2px solid var(--text-muted);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .creature-card.owned .check-box {
            background: var(--success);
            border-color: var(--success);
        }

        .check-box svg {
            width: 12px;
            height: 12px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s;
            fill: #fff;
        }

        .creature-card.owned .check-box svg {
            opacity: 1;
            transform: scale(1);
        }

        .creature-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            image-rendering: pixelated;
            flex-shrink: 0;
        }

        .creature-name {
            font-size: 0.8rem;
            font-weight: 500;
            line-height: 1.3;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-secondary);
        }

        .creature-card.owned .creature-name {
            color: var(--text-primary);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .no-results svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .no-results p {
            font-size: 0.9rem;
        }

        /* ── Loading ── */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 16px;
            color: var(--text-muted);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            font-size: 0.85rem;
        }

        /* ── Error ── */
        .error-state {
            text-align: center;
            padding: 60px 20px;
        }

        .error-state p {
            color: var(--danger);
            margin-bottom: 16px;
        }

        .btn-retry {
            padding: 9px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-retry:hover {
            background: var(--accent-hover);
        }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            color: var(--text-primary);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            animation: toast-in 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.success {
            border-color: var(--success-border);
        }

        .toast.error {
            border-color: var(--danger);
        }

        @keyframes toast-in {
            from { transform: translateY(12px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ── Mobile Menu ── */
        .mobile-header {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
        }

        .menu-toggle {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: none;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .menu-toggle svg {
            width: 20px;
            height: 20px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 199;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay.open {
                display: block;
            }

            .mobile-header {
                display: flex;
            }

            .main {
                margin-left: 0;
            }

            .page-header {
                padding: 16px;
            }

            .content-area {
                padding: 16px;
            }

            .stats-row {
                flex-direction: column;
                gap: 8px;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 6px;
            }

            .controls-row {
                flex-direction: column;
            }

            .page-header-top {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <h1>Tibia<span>App</span></h1>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-label">Trackers</div>
            <button class="nav-item active" data-page="soul-cores">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="4.93" y1="4.93" x2="9.17" y2="9.17"/><line x1="14.83" y1="14.83" x2="19.07" y2="19.07"/><line x1="14.83" y1="9.17" x2="19.07" y2="4.93"/><line x1="4.93" y1="19.07" x2="9.17" y2="14.83"/></svg>
                Soul Cores
            </button>
            <button class="nav-item" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
                Highscores
                <span class="coming-soon">EM BREVE</span>
            </button>
            <button class="nav-item" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Guilds
                <span class="coming-soon">EM BREVE</span>
            </button>

            <div class="nav-label">Info</div>
            <button class="nav-item" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                Spells
                <span class="coming-soon">EM BREVE</span>
            </button>
            <button class="nav-item" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                Worlds
                <span class="coming-soon">EM BREVE</span>
            </button>
        </nav>
        <div class="sidebar-footer">
            Dados via TibiaData API
        </div>
    </aside>

    <!-- Mobile Header -->
    <div class="mobile-header">
        <button class="menu-toggle" id="menu-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 style="font-size: 1rem; font-weight: 700;">Tibia<span style="color: var(--accent)">App</span></h1>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="page-header">
            <div class="page-header-top">
                <div class="page-title">
                    <h2>Soul Cores</h2>
                    <span class="badge" id="total-badge">0 criaturas</span>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" id="export-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        <span class="tooltip">Exportar</span>
                    </button>
                    <button class="btn-icon" id="import-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        <span class="tooltip">Importar</span>
                    </button>
                    <button class="btn-icon danger" id="reset-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                        <span class="tooltip">Resetar</span>
                    </button>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon green">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="owned-count">0</span>
                        <span class="stat-label">Obtidas</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="missing-count">0</span>
                        <span class="stat-label">Faltando</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon purple">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="total-count">0</span>
                        <span class="stat-label">Total</span>
                    </div>
                </div>
            </div>

            <div class="progress-row">
                <div class="progress-track">
                    <div class="progress-fill" id="progress-bar" style="width: 0%"></div>
                </div>
                <span class="progress-label" id="progress-pct">0%</span>
            </div>

            <div class="controls-row">
                <div class="search-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" class="search-input" id="search" placeholder="Buscar criatura..." autocomplete="off">
                </div>
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">Todas</button>
                    <button class="filter-btn" data-filter="owned">Obtidas</button>
                    <button class="filter-btn" data-filter="missing">Faltando</button>
                </div>
            </div>
        </div>

        <div class="content-area" id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Carregando criaturas...</p>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <input type="file" id="import-file" accept=".json" style="display: none">

    <script>
        const STORAGE_KEY = 'tibia-soul-cores-owned';
        const API_URL = 'https://api.tibiadata.com/v4/creatures';

        let allCreatures = [];
        let ownedSet = new Set();
        let currentFilter = 'all';

        // ── Toast ──
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            const icon = type === 'success'
                ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
                : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/></svg>';

            toast.innerHTML = `${icon} ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(8px)';
                toast.style.transition = 'all 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // ── Storage ──
        function loadOwned() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) ownedSet = new Set(JSON.parse(data));
            } catch { ownedSet = new Set(); }
        }

        function saveOwned() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify([...ownedSet]));
        }

        // ── Stats ──
        function updateStats() {
            const total = allCreatures.length;
            const owned = ownedSet.size;
            const missing = total - owned;
            const pct = total > 0 ? ((owned / total) * 100).toFixed(1) : 0;

            document.getElementById('owned-count').textContent = owned;
            document.getElementById('missing-count').textContent = missing;
            document.getElementById('total-count').textContent = total;
            document.getElementById('total-badge').textContent = `${total} criaturas`;
            document.getElementById('progress-pct').textContent = `${pct}%`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
        }

        // ── Toggle ──
        function toggleOwned(race) {
            if (ownedSet.has(race)) {
                ownedSet.delete(race);
            } else {
                ownedSet.add(race);
            }
            saveOwned();
            updateStats();

            const card = document.querySelector(`[data-race="${race}"]`);
            if (card) {
                card.classList.toggle('owned', ownedSet.has(race));
                if (currentFilter !== 'all') {
                    const shouldShow =
                        (currentFilter === 'owned' && ownedSet.has(race)) ||
                        (currentFilter === 'missing' && !ownedSet.has(race));
                    card.style.display = shouldShow ? '' : 'none';
                }
            }
        }

        // ── Render ──
        const checkSvg = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';

        function renderCreatures(filter = '', filterType = 'all') {
            const content = document.getElementById('content');
            const searchTerm = filter.toLowerCase();

            const filtered = allCreatures.filter(c => {
                const matchesSearch = c.name.toLowerCase().includes(searchTerm);
                const matchesFilter =
                    filterType === 'all' ||
                    (filterType === 'owned' && ownedSet.has(c.race)) ||
                    (filterType === 'missing' && !ownedSet.has(c.race));
                return matchesSearch && matchesFilter;
            });

            if (filtered.length === 0) {
                content.innerHTML = `
                    <div class="no-results">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <p>Nenhuma criatura encontrada.</p>
                    </div>`;
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'grid';

            const fragment = document.createDocumentFragment();
            for (const creature of filtered) {
                const card = document.createElement('div');
                card.className = `creature-card${ownedSet.has(creature.race) ? ' owned' : ''}`;
                card.dataset.race = creature.race;
                card.addEventListener('click', () => toggleOwned(creature.race));
                card.innerHTML = `
                    <div class="check-box">${checkSvg}</div>
                    <img class="creature-img" src="${creature.image_url}" alt="${creature.name}" loading="lazy" onerror="this.style.display='none'">
                    <span class="creature-name" title="${creature.name}">${creature.name}</span>`;
                fragment.appendChild(card);
            }

            grid.appendChild(fragment);
            content.innerHTML = '';
            content.appendChild(grid);
        }

        function applyFilters() {
            const search = document.getElementById('search').value;
            renderCreatures(search, currentFilter);
        }

        // ── Load Data ──
        async function loadCreatures() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                allCreatures = data.creatures.creature_list
                    .map(c => ({ name: c.name, race: c.race, image_url: c.image_url }))
                    .sort((a, b) => a.name.localeCompare(b.name));

                renderCreatures();
                updateStats();
            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <div class="error-state">
                        <p>Erro ao carregar criaturas: ${err.message}</p>
                        <button class="btn-retry" onclick="loadCreatures()">Tentar novamente</button>
                    </div>`;
            }
        }

        // ── Events ──
        let searchTimeout;
        document.getElementById('search').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(applyFilters, 200);
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                applyFilters();
            });
        });

        document.getElementById('export-btn').addEventListener('click', () => {
            const data = { version: 1, exported_at: new Date().toISOString(), owned: [...ownedSet] };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `soul-cores-backup-${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Backup exportado com sucesso!');
        });

        document.getElementById('import-btn').addEventListener('click', () => {
            document.getElementById('import-file').click();
        });

        document.getElementById('import-file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.owned && Array.isArray(data.owned)) {
                        ownedSet = new Set(data.owned);
                        saveOwned();
                        applyFilters();
                        updateStats();
                        showToast(`${ownedSet.size} soul cores importadas!`);
                    } else {
                        showToast('Formato de arquivo invalido.', 'error');
                    }
                } catch {
                    showToast('Erro ao ler o arquivo.', 'error');
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            if (confirm('Tem certeza que deseja resetar todas as soul cores?')) {
                ownedSet.clear();
                saveOwned();
                applyFilters();
                updateStats();
                showToast('Progresso resetado.');
            }
        });

        // ── Mobile Menu ──
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        document.getElementById('menu-toggle').addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        });

        // ── Init ──
        loadOwned();
        loadCreatures();
    </script>
</body>
</html>

<div class="sidebar-overlay" [class.open]="open()" (click)="closeOverlay()"></div>
<aside class="sidebar" [class.open]="open()">
  <div class="sidebar-brand">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2 4 6v6c0 5 3.5 9.5 8 10 4.5-.5 8-5 8-10V6l-8-4z"/>
    </svg>
    <h1>Tibia<span>App</span></h1>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-label">Trackers</div>
    @for (link of trackers; track link.path) {
      <a class="nav-item" [routerLink]="link.path" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2 4 6v6c0 5 3.5 9.5 8 10 4.5-.5 8-5 8-10V6l-8-4z"/>
        </svg>
        {{ link.label }}
      </a>
    }

    <div class="nav-label">Explore</div>
    @for (link of explore; track link.path) {
      <a class="nav-item" [routerLink]="link.path" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/>
        </svg>
        {{ link.label }}
      </a>
    }
  </nav>

  <div class="sidebar-footer">v0.2.0 · Angular</div>
</aside>
